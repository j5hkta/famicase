<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Portal FamiCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #0d6efd 0%, #0a3d8f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .pin-input {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 0.5rem;
            font-weight: bold;
        }
        .lab-logo {
            background: #0d6efd;
            color: white;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="row justify-content-center">
        <div class="col-sm-9 col-md-6 col-lg-4">
            <div class="card login-card">
                <div class="lab-logo">
                    <i class="bi bi-tooth" style="font-size: 2.5rem;"></i>
                    <h4 class="mt-2 mb-0 fw-bold">FamiCase</h4>
                    <div class="small opacity-75">Portal para odontólogos</div>
                </div>
                <div class="card-body p-4">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                        {% endfor %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted small">¿Quién eres?</label>
                            <select name="odontologo_id" class="form-select form-select-lg" required>
                                <option value="">— Selecciona tu nombre —</option>
                                {% for o in odontologos %}
                                <option value="{{ o.id }}">{{ o.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">Tu PIN de acceso</label>
                            <input type="password" inputmode="numeric" pattern="[0-9]*"
                                   class="form-control form-control-lg pin-input"
                                   name="pin" maxlength="6" placeholder="••••" required autocomplete="off">
                            <div class="form-text text-center">PIN proporcionado por el laboratorio</div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                        </button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <small class="text-muted">
                            <i class="bi bi-telephone me-1"></i>
                            Oscar Huánuco &amp; Santa Loayza<br>
                            Lima, Perú
                        </small>
                    </div>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{{ url_for('auth.login') }}" class="text-white opacity-50 small text-decoration-none">
                    Acceso administrativo →
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
